<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Combined Training Pipeline</title>
  <desc id="desc">Data, feature, split, and model training flow for the combined trading system.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .box { fill: #ffffff; stroke: #2f3a4a; stroke-width: 1.5; rx: 8; }
      .data { fill: #e9f5ff; }
      .feature { fill: #ecf8ef; }
      .split { fill: #fff4df; }
      .model { fill: #f4edff; }
      .artifact { fill: #fdf0f0; }
      .title { font: 700 22px Arial, sans-serif; fill: #172033; }
      .label { font: 700 15px Arial, sans-serif; fill: #172033; }
      .text { font: 13px Arial, sans-serif; fill: #334155; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text class="title" x="40" y="46">Combined NIFTY / Stock Training Pipeline</text>
  <text class="text" x="40" y="72">One pooled model set learns BUY / SELL / HOLD patterns across all symbols, with one global calendar-date split.</text>

  <rect class="box data" x="40" y="120" width="220" height="104"/>
  <text class="label" x="60" y="148">Raw intraday CSVs</text>
  <text class="text" x="60" y="174">*_minute.csv</text>
  <text class="text" x="60" y="194">*_minute_new.csv</text>
  <text class="text" x="60" y="214">*_5minute.csv</text>

  <rect class="box data" x="320" y="120" width="220" height="104"/>
  <text class="label" x="340" y="148">5m Parquet cache</text>
  <text class="text" x="340" y="174">Market hours filtered</text>
  <text class="text" x="340" y="194">1m resampled to 5m</text>
  <text class="text" x="340" y="214">Skipped if exists</text>

  <rect class="box feature" x="600" y="120" width="250" height="124"/>
  <text class="label" x="620" y="148">Feature engineering</text>
  <text class="text" x="620" y="174">EMA, RSI, MACD, BB, ATR</text>
  <text class="text" x="620" y="194">VWAP, relative volume, OBV</text>
  <text class="text" x="620" y="214">Trailing z-score + lags</text>
  <text class="text" x="620" y="234">Skipped if processed exists</text>

  <rect class="box feature" x="920" y="120" width="220" height="124"/>
  <text class="label" x="940" y="148">Processed features</text>
  <text class="text" x="940" y="174">One Parquet per symbol</text>
  <text class="text" x="940" y="194">Labels included</text>
  <text class="text" x="940" y="214">Feature config saved</text>
  <text class="text" x="940" y="234">Staged to /content</text>

  <path class="arrow" d="M260 172 H318"/>
  <path class="arrow" d="M540 172 H598"/>
  <path class="arrow" d="M850 182 H918"/>

  <rect class="box split" x="250" y="320" width="300" height="124"/>
  <text class="label" x="270" y="348">Combined frame</text>
  <text class="text" x="270" y="374">All symbols concatenated</text>
  <text class="text" x="270" y="394">symbol column attached</text>
  <text class="text" x="270" y="414">Shared numeric features only</text>
  <text class="small" x="270" y="434">Sorted by timestamp</text>

  <rect class="box split" x="650" y="320" width="300" height="124"/>
  <text class="label" x="670" y="348">Calendar-date split</text>
  <text class="text" x="670" y="374">70% train dates</text>
  <text class="text" x="670" y="394">15% validation dates</text>
  <text class="text" x="670" y="414">15% test dates</text>
  <text class="small" x="670" y="434">Same boundary for every symbol</text>

  <path class="arrow" d="M1030 244 V282 C1030 306 1010 320 986 320 H552"/>
  <path class="arrow" d="M550 382 H648"/>

  <rect class="box model" x="120" y="520" width="260" height="104"/>
  <text class="label" x="140" y="548">LightGBM</text>
  <text class="text" x="140" y="574">Current feature vector</text>
  <text class="text" x="140" y="594">symbol as categorical</text>
  <text class="text" x="140" y="614">Outputs 3 probabilities</text>

  <rect class="box model" x="470" y="520" width="260" height="104"/>
  <text class="label" x="490" y="548">LSTM</text>
  <text class="text" x="490" y="574">60-candle per-symbol sequence</text>
  <text class="text" x="490" y="594">Stacked recurrent layers</text>
  <text class="text" x="490" y="614">Outputs 3 logits</text>

  <rect class="box model" x="820" y="520" width="260" height="104"/>
  <text class="label" x="840" y="548">GRU</text>
  <text class="text" x="840" y="574">60-candle per-symbol sequence</text>
  <text class="text" x="840" y="594">Faster recurrent model</text>
  <text class="text" x="840" y="614">Outputs 3 logits</text>

  <path class="arrow" d="M760 444 C680 500 480 500 380 552"/>
  <path class="arrow" d="M800 444 V518"/>
  <path class="arrow" d="M840 444 C900 500 965 500 980 518"/>
</svg>
